# Local development infrastructure for the Longevity Health Analytics Platform.
#
# SAFETY: local/dev only. Synthetic data only — never point this at real patient data.
# Ports are deliberately non-default to avoid colliding with the read-only `hadp-alpha`
# reference stack (which holds host port 55432). All data stays on the local machine.
name: newhadp

services:
  postgres:
    image: postgres:16-alpine
    # Host port 55433 -> container 5432. (55432 is taken by the hadp-alpha reference.)
    ports:
      - "127.0.0.1:55433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hadp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hadp"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:56379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    # S3-compatible object storage for source documents (EU region in production).
    ports:
      - "127.0.0.1:59000:9000" # S3 API
      - "127.0.0.1:59001:9001" # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot job: create the source-documents bucket on first boot.
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/hadp-source-documents &&
      echo 'bucket ready';
      "

volumes:
  postgres-data:
  minio-data:
