name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Synthetic data only. No real patient data is ever present in CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-types-test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/hadp_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/hadp_test
      TEST_APP_DATABASE_URL: postgresql+psycopg://hadp_app:hadp_app@localhost:5432/hadp_test
      REDIS_URL: redis://localhost:6379/0
      SESSION_SECRET: ci-only-not-a-secret
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hadp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 3s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install JS dependencies
        run: pnpm install

      - name: Generate API client
        # src/generated/schema.ts is gitignored and derived from the committed openapi.json
        # (offline, deterministic — no running server). Regenerate it so typecheck/test resolve it.
        run: pnpm gen:client

      - name: Install API dependencies
        run: cd apps/api && uv sync

      - name: Provision app role and test database
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -U postgres -d hadp -v ON_ERROR_STOP=1 -c \
            "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='hadp_app') THEN CREATE ROLE hadp_app LOGIN PASSWORD 'hadp_app' NOSUPERUSER NOCREATEDB NOCREATEROLE; END IF; END \$\$;"
          psql -h localhost -U postgres -d hadp -v ON_ERROR_STOP=1 -c \
            "SELECT 1 FROM pg_database WHERE datname='hadp_test'" | grep -q 1 || \
          psql -h localhost -U postgres -d hadp -v ON_ERROR_STOP=1 -c "CREATE DATABASE hadp_test OWNER postgres"

      - name: Migrate test database
        run: cd apps/api && uv run alembic upgrade head

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: |
          cd apps/api && uv run pytest
          cd ../.. && pnpm -r --if-present test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version
      - name: gitleaks (scan committed history)
        # Run the CLI directly rather than gitleaks-action@v2: the action's PR mode calls the GitHub
        # API and fails on the default token ("Resource not accessible by integration"), so it never
        # actually scans. `gitleaks git` scans commit history — exactly what is published — and honors
        # the .gitleaks.toml allowlist, exiting non-zero on any finding outside it. fetch-depth: 0
        # (above) gives it the full history.
        run: ./gitleaks git . --config .gitleaks.toml --redact --no-banner

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: pip-audit (Python dependencies)
        # Blocking: a NEW advisory fails CI. The IDs below are KNOWN advisories in transitive deps
        # (starlette via FastAPI; pytest, dev-only) accepted pending the dependency-upgrade slice
        # tracked in docs/notes/0008-dependency-advisories.md. Re-review this allowlist on any dep
        # change; remove an ID once its fix is pulled in. This is an explicit, in-repo allowlist —
        # not a silent `|| echo` suppression.
        run: |
          cd apps/api && uv sync
          uv run --with pip-audit pip-audit \
            --ignore-vuln CVE-2025-71176 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln CVE-2025-54121 \
            --ignore-vuln CVE-2025-62727 \
            --ignore-vuln CVE-2026-48818 \
            --ignore-vuln CVE-2026-48817 \
            --ignore-vuln CVE-2026-54283 \
            --ignore-vuln CVE-2026-54282
      - uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: pnpm audit (JS dependencies)
        # Blocking on high/critical (moderate advisories are reported by Dependabot, not gated here).
        run: pnpm install && pnpm audit --audit-level high
